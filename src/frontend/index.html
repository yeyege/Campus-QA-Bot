<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>校园答疑智能客服</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: 'Inter', "Microsoft YaHei", "PingFang SC", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #333; font-size: 14px; line-height: 1.5;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.5); }

/* ===== Layout ===== */
.app { display: flex; flex-direction: column; height: 100vh; }

/* --- Top Nav --- */
.top-nav {
    height: 60px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center;
    padding: 0 32px; flex-shrink: 0; z-index: 10;
}
.top-nav .logo {
    display: flex; align-items: center; gap: 12px;
    font-size: 20px; font-weight: 700; color: #fff;
}
.top-nav .logo i { font-size: 24px; }

/* --- Main Row --- */
.main-row { display: flex; flex: 1; overflow: hidden; }

/* --- Left Sidebar (70px) --- */
.left-sidebar {
    width: 70px; flex-shrink: 0;
    background: rgba(0,0,0,0.2);
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 0; gap: 8px;
}
.menu-item {
    width: 48px; height: 48px;
    border-radius: 12px; cursor: pointer; color: rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; position: relative;
}
.menu-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
.menu-item.active { background: rgba(255,255,255,0.2); color: #fff; }
.menu-item.active::before {
    content: ''; position: absolute; left: -12px;
    width: 4px; height: 24px; background: #fff; border-radius: 0 4px 4px 0;
}
.menu-item i { font-size: 20px; }
.menu-tooltip {
    position: absolute; left: 64px; background: #1f2937; color: #fff;
    padding: 6px 12px; border-radius: 6px; font-size: 12px; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .2s;
}
.menu-item:hover .menu-tooltip { opacity: 1; }

/* --- Session Panel (300px) --- */
.session-panel {
    width: 300px; flex-shrink: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    border-right: 1px solid rgba(0,0,0,0.08);
    display: flex; flex-direction: column;
}
.session-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 20px 16px;
}
.session-header h3 {
    font-size: 18px; font-weight: 700; color: #1f2937;
    display: flex; align-items: center; gap: 10px;
}
.session-header h3 i { color: #6366f1; }
.session-header-btn {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #fff; transition: all .2s; box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}
.session-header-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
.session-header-btn i { font-size: 16px; }

.session-search { padding: 0 20px 16px; }
.session-search input {
    width: 100%; padding: 12px 16px 12px 40px;
    border: 2px solid #e5e7eb; border-radius: 12px;
    font-size: 14px; outline: none; background: #f9fafb;
    transition: all .2s;
}
.session-search { position: relative; }
.session-search i {
    position: absolute; left: 36px; top: 50%; transform: translateY(-50%);
    color: #9ca3af; font-size: 14px;
}
.session-search input:focus { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }

.session-list { flex: 1; overflow-y: auto; padding: 0 12px; }
.session-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 12px; cursor: pointer;
    margin-bottom: 4px; transition: all .2s; background: transparent;
}
.session-item:hover { background: #f3f4f6; }
.session-item.active { background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%); border: 1px solid rgba(102,126,234,0.2); }
.session-item-info { flex: 1; min-width: 0; }
.session-item-title { font-size: 14px; font-weight: 500; color: #1f2937; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-item-time { font-size: 12px; color: #9ca3af; margin-top: 4px; }
.session-item-del {
    width: 28px; height: 28px; border-radius: 8px;
    background: none; border: none; cursor: pointer;
    color: #9ca3af; opacity: 0; transition: all .2s;
    display: flex; align-items: center; justify-content: center;
}
.session-item:hover .session-item-del { opacity: 1; }
.session-item-del:hover { color: #ef4444; background: #fef2f2; }

/* --- Chat Area --- */
.chat-area {
    flex: 1; display: flex; flex-direction: column;
    background: rgba(255,255,255,0.98); min-width: 0;
}
.chat-header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 28px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0;
    background: #fff;
}
.chat-avatar {
    width: 44px; height: 44px; border-radius: 14px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; font-weight: 700; flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}
.chat-info .chat-name { font-size: 16px; font-weight: 700; color: #1f2937; }
.chat-info .chat-status {
    font-size: 13px; color: #10b981; display: flex; align-items: center; gap: 6px;
    margin-top: 2px;
}
.chat-status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #10b981;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
}

/* --- Messages --- */
.chat-messages { flex: 1; overflow-y: auto; padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }
.msg { display: flex; gap: 12px; max-width: 80%; animation: slideUp .3s ease; }
.msg.user { flex-direction: row-reverse; margin-left: auto; }
.msg.assistant { flex-direction: row; }
.msg-avatar {
    width: 38px; height: 38px; border-radius: 12px; display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 14px; font-weight: 600; color: #fff;
}
.msg.user .msg-avatar { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
.msg.assistant .msg-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
.msg-body { display: flex; flex-direction: column; }
.msg-bubble {
    padding: 14px 18px; border-radius: 16px; font-size: 14px;
    line-height: 1.7; word-wrap: break-word; white-space: pre-wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.msg.user .msg-bubble {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; border-bottom-right-radius: 4px;
    box-shadow: 0 4px 16px rgba(102,126,234,0.3);
}
.msg.assistant .msg-bubble { background: #f3f4f6; color: #1f2937; border-bottom-left-radius: 4px; }
.msg-time { font-size: 12px; color: #9ca3af; margin-top: 6px; }
.msg.user .msg-time { text-align: right; }
.msg-actions { display: flex; gap: 6px; margin-top: 6px; }
.msg-action {
    background: none; border: none; cursor: pointer; padding: 4px 8px;
    border-radius: 6px; color: #9ca3af; font-size: 12px; display: flex;
    align-items: center; gap: 4px; transition: all .15s;
}
.msg-action:hover { background: #f3f4f6; color: #6366f1; }
.msg-action i { font-size: 12px; }

/* typing indicator */
.typing-dots { display: flex; gap: 5px; padding: 4px 0; }
.typing-dots span {
    width: 7px; height: 7px; border-radius: 50%; background: #9ca3af;
    animation: bounce .6s infinite alternate;
}
.typing-dots span:nth-child(2) { animation-delay: .2s; }
.typing-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { to { opacity: .3; transform: translateY(-5px); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

/* --- Input Area --- */
.input-area {
    border-top: 1px solid #e5e7eb; padding: 16px 28px;
    display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    background: #fff;
}
.attach-btn {
    width: 42px; height: 42px; border-radius: 12px;
    background: #f3f4f6; border: none; cursor: pointer;
    color: #6b7280; display: flex; align-items: center;
    justify-content: center; transition: all .2s; flex-shrink: 0;
}
.attach-btn:hover { background: #e5e7eb; color: #374151; }
.attach-btn i { font-size: 18px; }
.input-wrap {
    flex: 1; display: flex; align-items: flex-end;
    border: 2px solid #e5e7eb; border-radius: 14px; padding: 0 6px 0 18px;
    background: #f9fafb; transition: all .2s;
}
.input-wrap:focus-within { border-color: #6366f1; background: #fff; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
.input-wrap textarea {
    flex: 1; border: none; outline: none; resize: none; padding: 12px 0;
    font-size: 14px; font-family: inherit; line-height: 1.5;
    min-height: 24px; max-height: 120px; background: transparent;
}
.input-wrap textarea::placeholder { color: #9ca3af; }
.send-btn {
    width: 40px; height: 40px; border-radius: 10px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: none; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: all .2s;
    box-shadow: 0 4px 12px rgba(102,126,234,0.3);
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.send-btn i { font-size: 16px; color: #fff; }

/* ===== Empty State ===== */
.empty-hint { color: #9ca3af; font-size: 13px; text-align: center; padding: 40px 0; }

/* ===== Quick Questions ===== */
.quick-questions { padding: 16px 32px 0; flex-shrink: 0; }
.quick-label { font-size: 13px; color: #6b7280; margin-bottom: 10px; font-weight: 500; }
.quick-list { display: flex; flex-wrap: wrap; gap: 10px; }
.quick-btn {
    padding: 8px 18px; border: 2px solid #e5e7eb; border-radius: 24px;
    background: #fff; color: #4b5563; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s; white-space: nowrap;
}
.quick-btn:hover {
    border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,0.05);
    box-shadow: 0 2px 8px rgba(99,102,241,0.15);
}

/* ===== Welcome Screen ===== */
.welcome-screen {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px; text-align: center;
}
.welcome-icon {
    width: 80px; height: 80px; border-radius: 24px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px; box-shadow: 0 8px 32px rgba(102,126,234,0.3);
}
.welcome-icon i { font-size: 36px; color: #fff; }
.welcome-title { font-size: 28px; font-weight: 700; color: #1f2937; margin-bottom: 12px; }
.welcome-desc { font-size: 15px; color: #6b7280; max-width: 400px; margin-bottom: 32px; }
</style>
</head>
<body>
<div class="app">
    <!-- ===== Top Nav ===== -->
    <div class="top-nav">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>校园答疑助手</span>
        </div>
    </div>

    <!-- ===== Main Row ===== -->
    <div class="main-row">
        <!-- Left Sidebar -->
        <div class="left-sidebar">
            <div class="menu-item active">
                <i class="fas fa-comment-dots"></i>
                <span class="menu-tooltip">对话</span>
            </div>
        </div>

        <!-- Session Panel -->
        <div class="session-panel">
            <div class="session-header">
                <h3><i class="fas fa-comments"></i> 会话列表</h3>
                <button class="session-header-btn" id="newSessionBtn" title="新建会话">
                    <i class="fas fa-plus"></i>
                </button>
            </div>
            <div class="session-search">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索会话...">
            </div>
            <div class="session-list" id="sessionList"></div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <div class="chat-avatar">助</div>
                <div class="chat-info">
                    <div class="chat-name">校园智能助手</div>
                    <div class="chat-status"><span class="chat-status-dot"></span> 在线服务中</div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen">
                    <div class="welcome-icon">
                        <i class="fas fa-graduation-cap"></i>
                    </div>
                    <div class="welcome-title">欢迎使用校园答疑助手</div>
                    <div class="welcome-desc">我可以帮你解答校园生活、选课、成绩、图书馆等各种问题，快来试试吧！</div>
                </div>
            </div>

            <div class="quick-questions" id="quickQuestions">
                <div class="quick-label">快速开始</div>
                <div class="quick-list">
                    <button class="quick-btn" data-q="食堂几点开门？">🍜 食堂几点开门？</button>
                    <button class="quick-btn" data-q="选课系统在哪里？">📚 选课系统在哪里？</button>
                    <button class="quick-btn" data-q="如何查询成绩？">📊 如何查询成绩？</button>
                    <button class="quick-btn" data-q="图书馆怎么借书？">📖 图书馆怎么借书？</button>
                    <button class="quick-btn" data-q="桂林理工大学有哪些学院？">🏫 桂林理工大学有哪些学院？</button>
                </div>
            </div>

            <div class="input-area">
                <button class="attach-btn" title="添加附件">
                    <i class="fas fa-paperclip"></i>
                </button>
                <div class="input-wrap">
                    <textarea id="msgInput" rows="1" placeholder="输入你的问题... (Enter 发送)"></textarea>
                    <button class="send-btn" id="sendBtn" title="发送">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// ============================================================
// Config
// ============================================================
const API_BASE = '';

// ============================================================
// State
// ============================================================
let sessions = {};
let currentSessionId = null;

// ============================================================
// localStorage Persistence
// ============================================================
const STORAGE_KEY_SESSIONS = 'campus_qa_sessions';
const STORAGE_KEY_CURRENT = 'campus_qa_current_session';

function saveSessions() {
    try {
        // 限制每个会话的消息数量，避免超出localStorage限制
        const sessionsToSave = {};
        for (const [id, session] of Object.entries(sessions)) {
            sessionsToSave[id] = {
                ...session,
                messages: session.messages.slice(-20) // 只保存最近20条消息
            };
        }
        localStorage.setItem(STORAGE_KEY_SESSIONS, JSON.stringify(sessionsToSave));
        localStorage.setItem(STORAGE_KEY_CURRENT, currentSessionId || '');
    } catch (e) {
        console.warn('保存会话失败:', e);
    }
}

function loadSessions() {
    try {
        const savedSessions = localStorage.getItem(STORAGE_KEY_SESSIONS);
        const savedCurrentId = localStorage.getItem(STORAGE_KEY_CURRENT);

        if (savedSessions) {
            sessions = JSON.parse(savedSessions);
        }
        if (savedCurrentId && sessions[savedCurrentId]) {
            currentSessionId = savedCurrentId;
        }
    } catch (e) {
        console.warn('加载会话失败:', e);
        sessions = {};
        currentSessionId = null;
    }
}

// ============================================================
// Helpers
// ============================================================
function genId() { return 's_' + Math.random().toString(36).slice(2, 10); }
function now() { return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }

function createSession() {
    const sid = genId();
    sessions[sid] = {
        title: '新会话',
        time: now(),
        messages: [{ role: 'assistant', content: '你好！我是校园智能助手，有什么可以帮助你的吗？', time: now() }]
    };
    saveSessions(); // 保存到localStorage
    return sid;
}

// ============================================================
// Render: Session List
// ============================================================
function renderSessionList(filter = '') {
    const el = document.getElementById('sessionList');
    const ids = Object.keys(sessions);
    const q = filter.trim().toLowerCase();

    if (!ids.length) {
        el.innerHTML = '<div class="empty-hint">暂无会话</div>';
        return;
    }

    el.innerHTML = ids
        .filter(id => !q || sessions[id].title.toLowerCase().includes(q))
        .map(id => {
            const s = sessions[id];
            const active = id === currentSessionId ? ' active' : '';
            return `
                <div class="session-item${active}" data-id="${id}">
                    <div class="session-item-info">
                        <div class="session-item-title">${esc(s.title)}</div>
                        <div class="session-item-time">${s.time}</div>
                    </div>
                    <button class="session-item-del" data-del="${id}" title="删除会话">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                </div>`;
        }).join('');

    el.querySelectorAll('.session-item').forEach(item => {
        item.addEventListener('click', e => {
            if (e.target.closest('.session-item-del')) return;
            switchSession(item.dataset.id);
        });
    });
    el.querySelectorAll('.session-item-del').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            deleteSession(btn.dataset.del);
        });
    });
}

// ============================================================
// Render: Messages
// ============================================================
function renderMessages() {
    const el = document.getElementById('chatMessages');
    if (!currentSessionId || !sessions[currentSessionId]) {
        el.innerHTML = `
            <div class="welcome-screen">
                <div class="welcome-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="welcome-title">欢迎使用校园答疑助手</div>
                <div class="welcome-desc">我可以帮你解答校园生活、选课、成绩、图书馆等各种问题，快来试试吧！</div>
            </div>`;
        return;
    }
    const msgs = sessions[currentSessionId].messages;

    if (msgs.length <= 1 && msgs[0]?.role === 'assistant') {
        el.innerHTML = `
            <div class="welcome-screen">
                <div class="welcome-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <div class="welcome-title">欢迎使用校园答疑助手</div>
                <div class="welcome-desc">我可以帮你解答校园生活、选课、成绩、图书馆等各种问题，快来试试吧！</div>
            </div>`;
        return;
    }

    el.innerHTML = msgs.map(m => {
        const isUser = m.role === 'user';
        const cls = isUser ? 'user' : 'assistant';
        const avatar = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
        const actions = isUser ? '' : `
            <div class="msg-actions">
                <button class="msg-action" onclick="copyMsg(this)" title="复制">
                    <i class="fas fa-copy"></i> 复制
                </button>
                <button class="msg-action" onclick="regenerate(this)" title="重新生成">
                    <i class="fas fa-sync-alt"></i> 重新生成
                </button>
            </div>`;
        return `
            <div class="msg ${cls}">
                <div class="msg-avatar">${avatar}</div>
                <div class="msg-body">
                    <div class="msg-bubble">${esc(m.content)}</div>
                    <div class="msg-time">${m.time || ''}</div>
                    ${actions}
                </div>
            </div>`;
    }).join('');

    el.scrollTop = el.scrollHeight;
}

function appendMessage(role, content, time) {
    const el = document.getElementById('chatMessages');
    // Remove welcome screen if exists
    const welcome = el.querySelector('.welcome-screen');
    if (welcome) welcome.remove();

    const isUser = role === 'user';
    const cls = isUser ? 'user' : 'assistant';
    const avatar = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';
    const html = `
        <div class="msg ${cls}">
            <div class="msg-avatar">${avatar}</div>
            <div class="msg-body">
                <div class="msg-bubble">${esc(content)}</div>
                <div class="msg-time">${time}</div>
            </div>
        </div>`;
    el.insertAdjacentHTML('beforeend', html);
    el.scrollTop = el.scrollHeight;
    return el.lastElementChild;
}

function addMsgActions(msgEl) {
    const body = msgEl.querySelector('.msg-body');
    if (body.querySelector('.msg-actions')) return;
    const html = `
        <div class="msg-actions">
            <button class="msg-action" onclick="copyMsg(this)" title="复制">
                <i class="fas fa-copy"></i> 复制
            </button>
            <button class="msg-action" onclick="regenerate(this)" title="重新生成">
                <i class="fas fa-sync-alt"></i> 重新生成
            </button>
        </div>`;
    body.insertAdjacentHTML('beforeend', html);
}

function showTyping() {
    const el = document.getElementById('chatMessages');
    const welcome = el.querySelector('.welcome-screen');
    if (welcome) welcome.remove();

    const html = `
        <div class="msg assistant" id="typingMsg">
            <div class="msg-avatar"><i class="fas fa-robot"></i></div>
            <div class="msg-body">
                <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div><span style="color:#9ca3af;font-size:13px;margin-left:8px">思考中...</span></div>
            </div>
        </div>`;
    el.insertAdjacentHTML('beforeend', html);
    el.scrollTop = el.scrollHeight;
}

function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
}

// ============================================================
// Session Actions
// ============================================================
function switchSession(sid) {
    if (!sessions[sid]) return;
    currentSessionId = sid;
    saveSessions(); // 保存当前会话ID
    renderSessionList(document.getElementById('searchInput').value);
    renderMessages();
}

function deleteSession(sid) {
    if (!sessions[sid]) return;
    delete sessions[sid];
    if (currentSessionId === sid) {
        const ids = Object.keys(sessions);
        currentSessionId = ids.length ? ids[0] : createSession();
    }
    saveSessions(); // 保存删除后的状态
    renderSessionList(document.getElementById('searchInput').value);
    renderMessages();
}

function newSession() {
    const sid = createSession();
    currentSessionId = sid;
    renderSessionList(document.getElementById('searchInput').value);
    renderMessages();
    document.getElementById('msgInput').focus();
}

// ============================================================
// Chat (Streaming via fetch + ReadableStream)
// ============================================================
async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text || !currentSessionId) return;

    input.value = '';
    autoResize(input);
    const ts = now();

    if (!sessions[currentSessionId]) {
        sessions[currentSessionId] = { title: '新会话', time: ts, messages: [] };
    }

    const session = sessions[currentSessionId];

    // first message -> update title
    if (session.messages.length <= 1 && session.messages[0]?.role === 'assistant') {
        session.title = text.length > 20 ? text.slice(0, 20) : text;
        renderSessionList(document.getElementById('searchInput').value);
    }

    // add user message
    session.messages.push({ role: 'user', content: text, time: ts });
    appendMessage('user', text, ts);
    saveSessions(); // 保存用户消息

    // show typing
    showTyping();
    document.getElementById('sendBtn').disabled = true;

    // stream response
    try {
        const resp = await fetch(API_BASE + '/api/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: currentSessionId })
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        let full = '';
        let bubble = null;

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        function processLine(line) {
            line = line.trim();
            if (!line.startsWith('data: ')) return;
            const data = line.slice(6).trim();
            if (data === '[DONE]') return;
            if (data.startsWith('{')) { try { JSON.parse(data); return; } catch {} }

            full += data;

            if (!bubble) {
                // first answer chunk — remove typing, create bubble
                removeTyping();
                appendMessage('assistant', '', ts);
                const allBubbles = document.querySelectorAll('.msg.assistant .msg-bubble');
                bubble = allBubbles[allBubbles.length - 1];
            }
            bubble.textContent = full;
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
        }

        while (true) {
            const { done, value } = await reader.read();
            buffer += decoder.decode(value, { stream: !done });
            const lines = buffer.split('\n');
            buffer = lines.pop();
            for (const line of lines) processLine(line);
            if (done) break;
        }
        if (buffer.trim()) processLine(buffer);

        // 兜底：流结束但没收到任何数据
        if (!bubble) {
            removeTyping();
            appendMessage('assistant', '抱歉，未能获取到回复，请重试。', ts);
        }

        // store answer
        session.messages.push({ role: 'assistant', content: full, time: ts });
        saveSessions(); // 保存助手回复
        // add action buttons after streaming complete
        const lastAssistant = document.querySelectorAll('.msg.assistant');
        addMsgActions(lastAssistant[lastAssistant.length - 1]);
    } catch (err) {
        removeTyping();
        const errMsg = '抱歉，处理您的问题时出现错误：' + err.message;
        const errEl = appendMessage('assistant', errMsg, ts);
        addMsgActions(errEl);
        session.messages.push({ role: 'assistant', content: errMsg, time: ts });
        saveSessions(); // 保存错误消息
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
}

// ============================================================
// Utils
// ============================================================
function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function autoResize(ta) {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function copyMsg(btn) {
    const bubble = btn.closest('.msg-body').querySelector('.msg-bubble');
    navigator.clipboard.writeText(bubble.textContent).then(() => {
        btn.innerHTML = '<i class="fas fa-check"></i> 已复制';
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-copy"></i> 复制';
        }, 1500);
    });
}

function regenerate(btn) {
    const msgEl = btn.closest('.msg');
    const session = sessions[currentSessionId];
    if (!session) return;

    // find the last user message
    let lastUserMsg = null;
    for (let i = session.messages.length - 1; i >= 0; i--) {
        if (session.messages[i].role === 'user') {
            lastUserMsg = session.messages[i].content;
            break;
        }
    }
    if (!lastUserMsg) return;

    // remove last assistant message from state and DOM
    for (let i = session.messages.length - 1; i >= 0; i--) {
        if (session.messages[i].role === 'assistant') {
            session.messages.splice(i, 1);
            break;
        }
    }
    msgEl.remove();

    // re-send
    document.getElementById('msgInput').value = lastUserMsg;
    sendMessage();
}

// ============================================================
// Init
// ============================================================
(function init() {
    // 从localStorage加载会话数据
    loadSessions();

    // 如果没有保存的会话，创建新会话
    if (!currentSessionId || !sessions[currentSessionId]) {
        if (Object.keys(sessions).length === 0) {
            // 没有任何会话，创建第一个
            const sid = createSession();
            currentSessionId = sid;
        } else {
            // 有会话但没有当前会话，选择第一个
            currentSessionId = Object.keys(sessions)[0];
        }
    }

    renderSessionList();
    renderMessages();

    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('msgInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('msgInput').addEventListener('input', function() { autoResize(this); });
    document.getElementById('newSessionBtn').addEventListener('click', newSession);
    document.getElementById('searchInput').addEventListener('input', function() {
        renderSessionList(this.value);
    });

    // quick question buttons
    document.getElementById('quickQuestions').addEventListener('click', function(e) {
        const btn = e.target.closest('.quick-btn');
        if (!btn) return;
        const q = btn.dataset.q;
        document.getElementById('msgInput').value = q;
        sendMessage();
    });
})();
</script>
